# Grafana Alloy — log shipper (replaces Promtail)
# Helm chart: grafana/alloy
# Runs as DaemonSet, scrapes pod logs + systemd journal, ships to Loki
alloy:
  configMap:
    create: true
    content: |
      // ──────────────────────────────────────────────
      // Pod logs — all namespaces
      // ──────────────────────────────────────────────
      discovery.kubernetes "pods" {
        role = "pod"
        selectors {
          role  = "pod"
          field = "spec.nodeName=" + sys.env("K8S_NODE_NAME")
        }
      }

      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          action        = "keep"
          regex         = ".+"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          target_label  = "app"
        }
        rule {
          target_label = "cluster"
          replacement  = "k3s-lan"
        }
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.write.default.receiver]
      }

      // ──────────────────────────────────────────────
      // systemd journal (k3s, kubelet, wireguard, etc.)
      // ──────────────────────────────────────────────
      loki.source.journal "host" {
        forward_to    = [loki.write.default.receiver]
        path          = "/var/log/journal"
        max_age       = "30m"
        labels        = {
          cluster = "k3s-lan",
          job     = "systemd-journal",
        }
      }

      // ──────────────────────────────────────────────
      // Loki sink
      // ──────────────────────────────────────────────
      loki.write "default" {
        endpoint {
          url = "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
        }
      }
  mounts:
    varlog: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

controller:
  type: daemonset
  nodeSelector:
    kubernetes.io/os: linux
  tolerations:
    - key: dedicated
      operator: Equal
      value: llm
      effect: NoSchedule
    - key: role
      operator: Equal
      value: edge
      effect: NoSchedule

configReloader:
  resources:
    requests:
      cpu: 10m
      memory: 50Mi
    limits:
      memory: 128Mi
