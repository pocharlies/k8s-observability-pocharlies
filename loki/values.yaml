# Loki single-binary — logs stored in MinIO (S3) on sauvage
# Helm chart: grafana/loki
# Index local in Longhorn PVC; chunks in MinIO bucket loki-chunks
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h
  storage:
    type: s3
    bucketNames:
      chunks: loki-chunks
      ruler: loki-chunks
      admin: loki-chunks
    s3:
      endpoint: minio-s3.minio.svc.cluster.local:9000
      region: us-east-1
      # Credentials via ExternalSecret from Vault (loki-minio-creds)
      # Fallback bootstrap values below — rotate via Vault after Phase 5
      accessKeyId: dibanez
      secretAccessKey: ChangeMe-MinIO-Bootstrap-2026!
      s3ForcePathStyle: true
      insecure: true
  limits_config:
    retention_period: 720h   # 30 days
    max_query_lookback: 720h
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32
  compactor:
    retention_enabled: true
    delete_request_store: s3

singleBinary:
  replicas: 1
  nodeSelector:
    topology: lan
    kubernetes.io/arch: amd64
  persistence:
    enabled: true
    storageClass: longhorn
    size: 20Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 2Gi

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
chunksCache:
  enabled: false
resultsCache:
  enabled: false

test:
  enabled: false
lokiCanary:
  enabled: false
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  serviceMonitor:
    enabled: true
