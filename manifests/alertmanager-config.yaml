apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAlertmanagerConfig
metadata:
  name: synapse-webhook
  namespace: monitoring
spec:
  route:
    # Default route: now that disableNamespaceMatcher is on (see
    # victoria-metrics/values.yaml), this captures ALL alerts of any
    # namespace — including infra (kube-state, node-exporter, etc.).
    # Grouped by alertname+namespace+severity and rate-limited (repeat 12h)
    # so the full infra catalogue does not flood Telegram.
    receiver: synapse-alertmanager
    group_by:
      - alertname
      - namespace
      - severity
    group_wait: 1m
    group_interval: 5m
    repeat_interval: 12h
    routes:
      # Critical alerts go to Synapse (LLM card) AND straight to Telegram.
      # The direct Telegram leg does not depend on Synapse, so a Synapse
      # outage (e.g. SynapseDown itself) still reaches the operator.
      - matchers:
          - "severity = critical"
        receiver: synapse-with-telegram-backup
      # Synapse application failures (pushed in by the ops-explainer) are
      # grouped by domain and rate-limited here so a burst of the same
      # failure collapses into one card instead of flooding Telegram.
      - matchers:
          - "alertname = SynapseWorkflowFailed"
        receiver: synapse-alertmanager
        group_by:
          - alertname
          - domain
        group_wait: 30s
        group_interval: 2m
        repeat_interval: 12h
      # K8s CronJob failures → cron-alert-analyzer service (in-cluster), which
      # fetches the failed pod's logs (k8s API), runs an LLM root-cause
      # analysis (vllm-122b via litellm), and posts the report to the Telegram
      # "Crons" topic with a deep-link to the dashboard. Grouped by CronJob
      # (owner_name) so repeat failures of the same cron collapse into one card.
      - matchers:
          - "alertname = K8sCronJobFailed"
        receiver: cron-alert-analyzer-webhook
        group_by:
          - alertname
          - namespace
          - owner_name
        group_wait: 30s
        group_interval: 2m
        repeat_interval: 6h
  receivers:
    - name: synapse-alertmanager
      webhook_configs:
        - url: https://synapse.e-dani.com/webhooks/alertmanager
          send_resolved: true
    - name: synapse-with-telegram-backup
      webhook_configs:
        - url: https://synapse.e-dani.com/webhooks/alertmanager
          send_resolved: true
      telegram_configs:
        - send_resolved: true
          bot_token:
            name: alertmanager-telegram-backup
            key: bot_token
          chat_id: -1003785136626
          parse_mode: HTML
    - name: cron-alert-analyzer-webhook
      webhook_configs:
        - url: http://cron-alert-analyzer.monitoring.svc.cluster.local:8080/alert
          send_resolved: false
