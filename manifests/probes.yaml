---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMProbe
metadata:
  name: k8s-control-plane-health
  namespace: monitoring
spec:
  jobName: k8s-control-plane-health
  interval: 30s
  scrapeTimeout: 10s
  module: http_alive
  vmProberSpec:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
    path: /probe
  targets:
    staticConfig:
      labels:
        scope: cluster
      targets:
        - http://vm-grafana.monitoring.svc.cluster.local/api/health
        - http://vmsingle-vm-victoria-metrics-k8s-stack.monitoring.svc.cluster.local:8428/health
        - http://vmagent-vm-victoria-metrics-k8s-stack.monitoring.svc.cluster.local:8429/health
        - http://vmalert-vm-victoria-metrics-k8s-stack.monitoring.svc.cluster.local:8080/health
        - http://loki.monitoring.svc.cluster.local:3100/ready
