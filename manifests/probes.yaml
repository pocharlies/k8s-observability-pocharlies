apiVersion: operator.victoriametrics.com/v1beta1
kind: VMProbe
metadata:
  name: k8s-lan-ingresses
  namespace: monitoring
spec:
  jobName: k8s-lan-ingresses
  interval: 30s
  scrapeTimeout: 10s
  module: http_alive_tls
  vmProberSpec:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
    path: /probe
  targets:
    staticConfig:
      labels:
        scope: lan
      targets:
        - https://adguard.lan.e-dani.com/
        - https://argocd.lan.e-dani.com/
        - https://auth.lan.e-dani.com/
        - https://code.lan.e-dani.com/
        - https://grafana.lan.e-dani.com/
        - https://alertmanager.lan.e-dani.com/
        - https://vm.lan.e-dani.com/
        - https://harbor.lan.e-dani.com/
        - https://libreplay.lan.e-dani.com/
        - https://litellm.lan.e-dani.com/
        - https://longhorn.lan.e-dani.com/
        - https://minio.lan.e-dani.com/
        - https://s3.lan.e-dani.com/
        - https://teslamate.lan.e-dani.com/
        - https://vault.lan.e-dani.com/
---
apiVersion: operator.victoriametrics.com/v1beta1
