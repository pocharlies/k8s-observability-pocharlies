apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: pocharlies-service-visibility
  namespace: monitoring
spec:
  groups:
    - name: pocharlies.service-visibility
      rules:
        - alert: BlackboxProbeDown
          expr: probe_success{job=~"k8s-.*"} == 0
          for: 2m
          labels:
            severity: warning
            area: availability
          annotations:
            summary: "Endpoint probe is failing"
            description: "{{ $labels.instance }} has failed blackbox probes for more than 2 minutes."
        - alert: KubernetesDeploymentUnavailable
          expr: kube_deployment_spec_replicas > kube_deployment_status_replicas_available
          for: 5m
          labels:
            severity: critical
            area: kubernetes
          annotations:
            summary: "Deployment unavailable"
            description: "{{ $labels.namespace }}/{{ $labels.deployment }} has fewer available replicas than desired."
        - alert: KubernetesStatefulSetUnavailable
          expr: kube_statefulset_replicas > kube_statefulset_status_replicas_ready
          for: 5m
          labels:
            severity: critical
            area: kubernetes
          annotations:
            summary: "StatefulSet unavailable"
            description: "{{ $labels.namespace }}/{{ $labels.statefulset }} has fewer ready replicas than desired."
        - alert: KubernetesDaemonSetUnavailable
          expr: kube_daemonset_status_desired_number_scheduled > kube_daemonset_status_number_ready
          for: 10m
          labels:
            severity: warning
            area: kubernetes
          annotations:
            summary: "DaemonSet unavailable"
            description: "{{ $labels.namespace }}/{{ $labels.daemonset }} has nodes without a ready daemon pod."
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: pocharlies-synapse
  namespace: monitoring
spec:
  groups:
    - name: pocharlies.synapse
      rules:
        # Synapse is Alertmanager's only path to Telegram. If it is down,
        # every alert is lost silently — so this is critical and MUST be
        # delivered via the direct-to-Telegram backup receiver (which does
        # not depend on Synapse). See alertmanager-config.yaml.
        - alert: SynapseDown
          expr: probe_success{job="synapse-gateway"} == 0
          for: 2m
          labels:
            severity: critical
            area: availability
            component: synapse
          annotations:
            summary: "Synapse gateway is down — alert delivery is broken"
            description: "synapse.e-dani.com/webhooks/alertmanager is not responding for >2m. Alertmanager cannot deliver alerts to Telegram through Synapse. Check synapse-gateway (systemd --user) on sauvage."
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: pocharlies-k8s-cronjobs
  namespace: monitoring
spec:
  groups:
    - name: pocharlies.k8s-cronjobs
      rules:
        # Fires once a CronJob-owned Job has failed pods. The cron-alert-analyzer
        # receives the webhook, fetches the pod logs via the k8s API, runs an
        # LLM root-cause analysis (vllm-122b via litellm), and posts the report
        # to the Telegram "Crons" topic with a deep-link to the dashboard.
        # severity:warning (NOT critical) so this does NOT also fire the
        # severity=critical → telegram-backup route (which would duplicate the
        # alert in the General topic without LLM analysis).
        - alert: K8sCronJobFailed
          expr: |
            (
              max by (namespace, job_name) (kube_job_status_failed > 0)
            )
            * on (namespace, job_name) group_left(owner_name)
              max by (namespace, job_name, owner_name) (kube_job_owner{owner_kind="CronJob"})
          for: 1m
          labels:
            severity: warning
            area: kubernetes
            domain: crons
          annotations:
            summary: "CronJob {{ $labels.namespace }}/{{ $labels.owner_name }} failed"
            description: "Job {{ $labels.job_name }} owned by CronJob {{ $labels.namespace }}/{{ $labels.owner_name }} has failed. The cron-alert-analyzer will post a root-cause analysis to the Telegram 'Crons' topic."
