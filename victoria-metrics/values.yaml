# VictoriaMetrics k8s-stack — drop-in for kube-prometheus-stack, lighter
victoria-metrics-operator:
  enabled: true

defaultRules:
  groups:
    etcd:
      create: false
    kubernetesSystemControllerManager:
      create: false
    kubeScheduler:
      create: false
    kubernetesSystemScheduler:
      create: false

kubeEtcd:
  enabled: false

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

vmsingle:
  enabled: true
  spec:
    useDefaultResources: false
    resources:
      requests:
        cpu: 300m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 4Gi
    extraArgs:
      maxLabelsPerTimeseries: "200"
    retentionPeriod: "90d"
    storage:
      accessModes: [ReadWriteOnce]
      storageClassName: longhorn
      resources:
        requests:
          storage: 50Gi
    nodeSelector:
      topology: lan
      kubernetes.io/arch: amd64

vmcluster:
  enabled: false   # single-node mode

vmagent:
  enabled: true
  spec:
    selectAllByDefault: true
    nodeSelector:
      topology: lan

vmalert:
  enabled: true
  spec:
    nodeSelector:
      topology: lan
  remoteWriteVMAgent: false

alertmanager:
  enabled: true
  spec:
    hostAliases:
      - ip: "100.109.183.9"
        hostnames:
          - synapse.e-dani.com
    nodeSelector:
      topology: lan
      kubernetes.io/hostname: ubuntu
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: [ReadWriteOnce]
          storageClassName: longhorn
          resources:
            requests:
              storage: 5Gi

grafana:
  enabled: true
  adminPassword: "ChangeMe-Grafana-Bootstrap-2026!"
  envValueFrom:
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-oauth
        key: client-secret
  grafana.ini:
    server:
      domain: grafana.lan.e-dani.com
      root_url: https://grafana.lan.e-dani.com/
    auth.generic_oauth:
      enabled: true
      name: Authelia
      icon: signin
      allow_sign_up: true
      auto_login: false
      client_id: grafana
      client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
      scopes: openid profile email groups
      empty_scopes: false
      auth_url: https://auth.lan.e-dani.com/api/oidc/authorization
      token_url: http://authelia.authelia.svc.cluster.local/api/oidc/token
      api_url: http://authelia.authelia.svc.cluster.local/api/oidc/userinfo
      login_attribute_path: preferred_username
      groups_attribute_path: groups
      name_attribute_path: name
      role_attribute_path: "email=='me@e-dani.com' && 'GrafanaAdmin' || ''"
      role_attribute_strict: true
      skip_org_role_sync: false
      allow_assign_grafana_admin: true
      auth_style: InHeader
      use_pkce: true
      validate_id_token: true
      jwk_set_url: http://authelia.authelia.svc.cluster.local/jwks.json
  persistence:
    enabled: true
    storageClassName: longhorn
    size: 10Gi
  nodeSelector:
    topology: lan
    kubernetes.io/hostname: ubuntu
  service:
    type: ClusterIP
  # disable ingress here, use Traefik IngressRoute
  ingress:
    enabled: false
  sidecar:
    dashboards:
      enabled: true
      defaultFolderName: General
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
    datasources:
      enabled: true
      searchNamespace: ALL
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: Europe/Madrid

# Standard exporters
kubeStateMetrics:
  enabled: true
  nodeSelector:
    topology: lan

nodeExporter:
  enabled: true

prometheus-node-exporter:
  hostNetwork: false
  nodeSelector: {}
  tolerations:
    - operator: Exists   # let it run on tainted nodes too
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      memory: 128Mi

# Don't enable the kube-state-metrics subchart on edge (sauvage)
kube-state-metrics:
  nodeSelector:
    topology: lan
