# VictoriaMetrics k8s-stack — drop-in for kube-prometheus-stack, lighter
victoria-metrics-operator:
  enabled: true

defaultRules:
  groups:
    etcd:
      create: false
    kubernetesSystemControllerManager:
      create: false
    kubeScheduler:
      create: false
    kubernetesSystemScheduler:
      create: false

kubeEtcd:
  enabled: false

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

vmsingle:
  enabled: true
  spec:
    useDefaultResources: false
    resources:
      requests:
        cpu: 300m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 12Gi
    extraArgs:
      maxLabelsPerTimeseries: "200"
    retentionPeriod: "15d"
    storage:
      accessModes: [ReadWriteOnce]
      storageClassName: longhorn
      resources:
        requests:
          storage: 50Gi
    nodeSelector:
      topology: lan
      kubernetes.io/arch: amd64

vmcluster:
  enabled: false   # single-node mode

vmagent:
  enabled: true
  spec:
    extraArgs:
      promscrape.maxScrapeSize: "67108864"
      promscrape.streamParse: "true"
    selectAllByDefault: true
    nodeSelector:
      topology: lan

vmalert:
  enabled: true
  spec:
    nodeSelector:
      topology: lan
  remoteWriteVMAgent: false

alertmanager:
  enabled: true
  spec:
    # Drop the per-config `namespace="monitoring"` entry matcher the
    # operator otherwise injects into the synapse-webhook route. Without
    # this, infra alerts (kube-state/node-exporter carry the AFFECTED
    # object's namespace, not "monitoring") never enter the route and are
    # dropped to the blackhole receiver. With it, the route captures ALL
    # alerts regardless of namespace.
    disableNamespaceMatcher: true
    hostAliases:
      - ip: "100.109.183.9"
        hostnames:
          - synapse.e-dani.com
    nodeSelector:
      topology: lan
      kubernetes.io/hostname: ubuntu
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: [ReadWriteOnce]
          storageClassName: longhorn
          resources:
            requests:
              storage: 5Gi

grafana:
  enabled: true
  adminPassword: "ChangeMe-Grafana-Bootstrap-2026!"
  envValueFrom:
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-oauth
        key: client-secret
  grafana.ini:
    server:
      domain: grafana.lan.e-dani.com
      root_url: https://grafana.lan.e-dani.com/
    auth.generic_oauth:
      enabled: true
      name: Authelia
      icon: signin
      allow_sign_up: true
      auto_login: false
      client_id: grafana
      client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
      scopes: openid profile email groups
      empty_scopes: false
      auth_url: https://auth.lan.e-dani.com/api/oidc/authorization
      token_url: http://authelia.authelia.svc.cluster.local/api/oidc/token
      api_url: http://authelia.authelia.svc.cluster.local/api/oidc/userinfo
      login_attribute_path: preferred_username
      groups_attribute_path: groups
      name_attribute_path: name
      role_attribute_path: "email=='me@e-dani.com' && 'GrafanaAdmin' || ''"
      role_attribute_strict: true
      skip_org_role_sync: false
      allow_assign_grafana_admin: true
      auth_style: InHeader
      use_pkce: true
      validate_id_token: true
      jwk_set_url: http://authelia.authelia.svc.cluster.local/jwks.json
  persistence:
    enabled: true
    storageClassName: longhorn
    size: 10Gi
  nodeSelector:
    topology: lan
    kubernetes.io/hostname: ubuntu
  service:
    type: ClusterIP
  # disable ingress here, use Traefik IngressRoute
  ingress:
    enabled: false
  sidecar:
    dashboards:
      enabled: true
      defaultFolderName: General
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
    datasources:
      enabled: true
      searchNamespace: ALL
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: Europe/Madrid

# Standard exporters
kubeStateMetrics:
  enabled: true
  nodeSelector:
    topology: lan

nodeExporter:
  enabled: true

prometheus-node-exporter:
  hostNetwork: false
  nodeSelector: {}
  tolerations:
    - operator: Exists   # let it run on tainted nodes too
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      memory: 128Mi
  # NOTE: this list REPLACES the chart's default extraArgs, so we must
  # repeat the upstream filesystem exclude flags in addition to enabling
  # the textfile collector.
  extraArgs:
    - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
    - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|erofs|sysfs|tracefs)$
    - --collector.textfile.directory=/host/root/var/lib/node_exporter/textfile_collector

# Override cadvisor scrape to drop the high-cardinality `id` cgroup label
# (every container restart creates new series). Keep only container_* metrics
# (cadvisor is container-only anyway), then drop the `id` label.
kubelet:
  vmScrapes:
    cadvisor:
      spec:
        metricRelabelConfigs:
          - source_labels: [__name__]
            regex: "container_.+"
            action: keep
          - regex: "id"
            action: labeldrop

# Don't enable the kube-state-metrics subchart on edge (sauvage)
kube-state-metrics:
  metricLabelsAllowlist:
    - services=[infra]
    - namespaces=[infra]
  nodeSelector:
    topology: lan
